{% extends "layout.html" %}

{% block title %}交易{% endblock %}

{% block content %}
<div class="page-header">
    <h2>💱 交易</h2>
</div>

<!-- 快速下单卡片 -->
<div class="card">
    <h3>快速下单</h3>
    <form id="order-form" class="form-grid">
        <div class="form-group">
            <label>交易对</label>
            <select id="order-symbol" required>
                <option value="BTC/USDT">BTC/USDT</option>
                <option value="ETH/USDT">ETH/USDT</option>
                <option value="SOL/USDT">SOL/USDT</option>
            </select>
        </div>
        <div class="form-group">
            <label>方向</label>
            <div class="button-group">
                <button type="button" class="btn-side buy active" data-side="buy">买入</button>
                <button type="button" class="btn-side sell" data-side="sell">卖出</button>
            </div>
        </div>
        <div class="form-group">
            <label>数量</label>
            <input type="number" step="0.001" min="0" id="order-quantity" placeholder="0.01" required>
        </div>
        <div class="form-group">
            <label>类型</label>
            <select id="order-type">
                <option value="market">市价单</option>
                <option value="limit">限价单</option>
            </select>
        </div>
        <div class="form-group" id="limit-price-group" style="display:none;">
            <label>限价</label>
            <input type="number" step="0.01" id="order-price" placeholder="0.00">
        </div>
        <button type="submit" class="btn-submit">提交订单</button>
    </form>
    <div id="order-result" class="result-box"></div>
</div>

<!-- 活跃订单 -->
<div class="card">
    <h3>活跃订单</h3>
    <div class="table-container">
        <table class="orders-table" id="active-orders-table">
            <thead>
                <tr>
                    <th>交易对</th>
                    <th>方向</th>
                    <th>数量</th>
                    <th>价格</th>
                    <th>状态</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="active-orders-body">
                <tr><td colspan="6" class="text-center">暂无活跃订单</td></tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    // 买卖按钮切换
    document.querySelectorAll('.btn-side').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.btn-side').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
        });
    });

    // 订单类型切换显示限价输入
    const orderType = document.getElementById('order-type');
    const limitPriceGroup = document.getElementById('limit-price-group');
    orderType.addEventListener('change', function() {
        limitPriceGroup.style.display = this.value === 'limit' ? 'block' : 'none';
    });

    // 提交订单
    document.getElementById('order-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const symbol = document.getElementById('order-symbol').value;
        const side = document.querySelector('.btn-side.active').dataset.side;
        const quantity = parseFloat(document.getElementById('order-quantity').value);
        const type = document.getElementById('order-type').value;
        const price = type === 'limit' ? parseFloat(document.getElementById('order-price').value) : null;

        const payload = { symbol, side, quantity, order_type: type };
        if (price) payload.price = price;

        try {
            const res = await fetch('/api/order', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            const resultDiv = document.getElementById('order-result');
            if (data.success) {
                resultDiv.className = 'result-box success';
                resultDiv.textContent = `订单已提交: ${data.order_id}`;
            } else {
                resultDiv.className = 'result-box error';
                resultDiv.textContent = '失败: ' + (data.error || '未知错误');
            }
        } catch (err) {
            alert('网络错误');
        }
    });

    // 定期刷新订单列表
    setInterval(fetchActiveOrders, 5000);
    fetchActiveOrders();
});

async function fetchActiveOrders() {
    try {
        const res = await fetch('/api/orders/active');
        if (res.ok) {
            const orders = await res.json();
            renderActiveOrders(orders);
        }
    } catch (e) {}
}

function renderActiveOrders(orders) {
    const tbody = document.getElementById('active-orders-body');
    if (!orders || orders.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center">暂无活跃订单</td></tr>';
        return;
    }
    tbody.innerHTML = orders.map(o => `
        <tr>
            <td>${o.symbol}</td>
            <td><span class="badge-side ${o.side === 'buy' ? 'badge-buy' : 'badge-sell'}">${o.side === 'buy' ? '买入' : '卖出'}</span></td>
            <td>${o.quantity}</td>
            <td>${o.price || '-'}</td>
            <td>${o.status}</td>
            <td><button class="action-btn action-btn-close" onclick="cancelOrder('${o.id}')">取消</button></td>
        </tr>
    `).join('');
}

async function cancelOrder(orderId) {
    if (!confirm('确定取消订单？')) return;
    try {
        await fetch(`/api/order/${orderId}/cancel`, {method: 'POST'});
        fetchActiveOrders();
    } catch (e) {}
}
</script>
{% endblock %}
