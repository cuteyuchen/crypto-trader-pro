<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Trader Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* 全局样式 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; color: #333; }
        
        /* 顶部导航 */
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 0 20px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .navbar h1 { font-size: 1.4rem; margin: 0; }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a {
            color: rgba(255,255,255,0.9);
            text-decoration: none;
            font-weight: 500;
            padding: 8px 12px;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .nav-links a:hover, .nav-links a.active { background: rgba(255,255,255,0.2); }

        .container { max-width: 1400px; margin: 20px auto; padding: 0 15px; }
        .page { display: none; }
        .page.active { display: block; }

        /* 卡片 */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .card h3 { color: #667eea; margin-bottom: 15px; font-size: 1.1rem; border-bottom: 2px solid #667eea; padding-bottom: 8px; }

        /* 表格 */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #eee; font-size: 0.95rem; }
        th { background: #f8fafc; color: #666; font-weight: 600; }
        .positive { color: #10b981; }
        .negative { color: #ef4444; }

        /* 按钮与表单 */
        .btn { background: #667eea; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
        .btn:hover { background: #5a67d8; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 4px; font-size: 0.9rem; color: #666; }
        .form-group input, .form-group select {
            width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .navbar { padding: 0 10px; height: auto; flex-direction: column; align-items: flex-start; }
            .nav-links { flex-wrap: wrap; margin-top: 10px; }
            .container { padding: 0 10px; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <h1>🦀 Crypto Trader Pro</h1>
        <div class="nav-links">
            <a href="#" data-page="dashboard" class="active">概览</a>
            <a href="#" data-page="trading">交易</a>
            <a href="#" data-page="strategy">策略</a>
            <a href="#" data-page="backtesting">回测</a>
            <a href="#" data-page="logs">日志</a>
            <a href="#" data-page="settings">设置</a>
        </div>
    </nav>

    <div class="container">
        <!-- 概览页面 -->
        <div id="dashboard" class="page active">
            <div class="grid">
                <div class="card">
                    <h3>运行状态</h3>
                    <div class="status-item"><span class="label">模式:</span><span class="value" id="status-mode">-</span></div>
                    <div class="status-item"><span class="label">运行中:</span><span class="value" id="status-running">-</span></div>
                    <div class="status-item"><span class="label">策略:</span><span class="value" id="status-strategy">-</span></div>
                    <div class="status-item"><span class="label">K线数:</span><span class="value" id="status-kline">-</span></div>
                </div>
                <div class="card">
                    <h3>账户余额 (USDT)</h3>
                    <div style="text-align:center; font-size:2rem; font-weight:bold; color:#667eea;" id="balance">-</div>
                </div>
                <div class="card">
                    <h3>今日盈亏</h3>
                    <div style="text-align:center; font-size:2rem; font-weight:bold;" id="daily-pnl">-</div>
                </div>
            </div>

            <div class="card">
                <h3>当前持仓</h3>
                <div id="positions-loading" class="loading">加载中...</div>
                <table id="positions-table" style="display:none;">
                    <thead><tr><th>交易对</th><th>方向</th><th>数量</th><th>入场价</th><th>当前价</th><th>未实现盈亏</th></tr></thead>
                    <tbody id="positions-body"></tbody>
                </table>
                <div id="positions-empty" class="loading" style="display:none;">暂无持仓</div>
            </div>

            <div class="card">
                <h3>最近交易</h3>
                <div id="trades-loading" class="loading">加载中...</div>
                <table id="trades-table" style="display:none;">
                    <thead><tr><th>时间</th><th>交易对</th><th>方向</th><th>数量</th><th>价格</th><th>盈亏</th></tr></thead>
                    <tbody id="trades-body"></tbody>
                </table>
                <div id="trades-empty" class="loading" style="display:none;">暂无交易</div>
            </div>

            <div class="card">
                <h3>余额走势</h3>
                <div class="chart-container" style="height:300px;">
                    <canvas id="balanceChart"></canvas>
                </div>
            </div>
        </div>

        <!-- 交易页面 -->
        <div id="trading" class="page">
            <div class="grid">
                <div class="card">
                    <h3>快速下单</h3>
                    <form id="trade-form">
                        <div class="form-group">
                            <label>交易对</label>
                            <input type="text" id="trade-symbol" value="BTC/USDT" readonly>
                        </div>
                        <div class="form-group">
                            <label>方向</label>
                            <select id="trade-side">
                                <option value="buy">买入</option>
                                <option value="sell">卖出</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>数量 (BTC)</label>
                            <input type="number" step="0.001" min="0" id="trade-quantity" required>
                        </div>
                        <div class="form-group">
                            <label>类型</label>
                            <select id="trade-type">
                                <option value="market">市价单</option>
                            </select>
                        </div>
                        <button type="submit" class="btn" style="width:100%">提交订单</button>
                    </form>
                    <div id="trade-result" style="margin-top:10px;"></div>
                </div>

                <div class="card">
                    <h3>当前余额</h3>
                    <div style="font-size:2rem; font-weight:bold; color:#667eea;" id="balance2">-</div>
                </div>
            </div>
        </div>

        <!-- 策略页面 -->
        <div id="strategy" class="page">
            <div class="card">
                <h3>策略配置</h3>
                <p>当前策略: <strong id="current-strategy-name">-</strong></p>
                <!-- 策略参数将在此动态加载 -->
                <div id="strategy-params"></div>
                <button class="btn" id="reload-strategy-btn">重载策略</button>
                <div id="strategy-status" style="margin-top:10px;"></div>
            </div>
        </div>

        <!-- 回测页面 -->
        <div id="backtesting" class="page">
            <div class="card">
                <h3>回测配置</h3>
                <form id="backtest-form">
                    <div class="form-group">
                        <label>策略</label>
                        <select id="backtest-strategy">
                            <option value="ma_cross">MA交叉</option>
                            <option value="rsi">RSI</option>
                            <option value="bollinger">布林带</option>
                            <option value="macd">MACD</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>时间范围 (天)</label>
                        <input type="number" id="backtest-days" value="30" min="1" max="365">
                    </div>
                    <div class="form-group">
                        <label>初始资金 (USDT)</label>
                        <input type="number" id="backtest-initial" value="10000" min="100">
                    </div>
                    <button type="submit" class="btn">开始回测</button>
                </form>
                <div id="backtest-result" style="margin-top:15px;"></div>
            </div>
        </div>

        <!-- 日志页面 -->
        <div id="logs" class="page">
            <div class="card">
                <h3>系统日志</h3>
                <div id="log-content" style="font-family:monospace; white-space: pre-wrap; background:#1a1a1a; color:#0f0; padding:15px; border-radius:6px; height:500px; overflow:auto;"></div>
            </div>
        </div>

        <!-- 设置页面 -->
        <div id="settings" class="page">
            <div class="card">
                <h3>系统设置</h3>
                <p>设置可以直接编辑配置文件并重载。</p>
                <div class="form-group">
                    <label>交易所</label>
                    <select id="setting-exchange">
                        <option value="okx">OKX (推荐)</option>
                        <option value="binance">Binance</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>通知开关</label>
                    <select id="setting-notify">
                        <option value="true">启用</option>
                        <option value="false">禁用</option>
                    </select>
                </div>
                <button class="btn" id="save-settings-btn">保存并应用</button>
                <div id="settings-status" style="margin-top:10px;"></div>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
