<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Trader Pro - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #667eea; --bg: #f5f7fa; --card: #fff; --text: #333; --success: #10b981; --danger: #ef4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; min-height: 100vh; }
        /* 侧边导航 */
        .sidebar { width: 240px; background: #1a1a2e; color: #fff; padding: 20px 0; flex-shrink: 0; }
        .sidebar h1 { font-size: 1.2rem; text-align: center; margin-bottom: 30px; }
        .nav-item { display: block; padding: 12px 20px; color: #ccc; text-decoration: none; transition: 0.2s; }
        .nav-item:hover, .nav-item.active { background: var(--primary); color: #fff; }
        /* 主内容区 */
        .main { flex: 1; padding: 20px; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .status-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .stat-label { color: #666; font-size: 0.9rem; }
        .stat-value { font-size: 1.8rem; font-weight: bold; color: var(--primary); margin-top: 5px; }
        .card { background: var(--card); padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .card h3 { color: var(--primary); margin-bottom: 15px; border-bottom: 2px solid var(--primary); padding-bottom: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8fafc; color: #666; font-weight: 600; }
        .positive { color: var(--success); }
        .negative { color: var(--danger); }
        .btn { background: var(--primary); color: #fff; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: 500; }
        .btn:hover { opacity: 0.9; }
        .btn-sm { padding: 4px 8px; font-size: 0.85rem; }
        .btn-danger { background: var(--danger); }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 4px; font-size: 0.9rem; color: #666; }
        .form-group input, .form-group select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        .chart-container { height: 300px; margin-top: 15px; }
        .mobile-hide { display: block; }
        @media (max-width: 768px) {
            .sidebar { width: 60px; padding: 10px 0; }
            .sidebar h1, .nav-item span { display: none; }
            .nav-item::after { content: attr(data-icon); }
            .main { padding: 10px; }
            .status-bar { grid-template-columns: 1fr 1fr; }
        }
        /* 网格搜索样式 */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #eee; }
        .tab-btn { padding: 10px 20px; border: none; background: transparent; cursor: pointer; border-bottom: 2px solid transparent; color: #666; font-weight: 500; transition: all 0.2s; }
        .tab-btn:hover { color: var(--primary); }
        .tab-btn.active { border-bottom-color: var(--primary); color: var(--primary); }
        .param-row { display: grid; grid-template-columns: 1fr 80px 80px 80px 32px; gap: 8px; margin-bottom: 10px; align-items: center; }
        .param-row input { padding: 6px; border: 1px solid #ddd; border-radius: 4px; font-size: 0.9rem; }
        .param-row input:focus { outline: none; border-color: var(--primary); }
        .remove-param { padding: 4px 8px; font-size: 1.2rem; line-height: 1; }
        #optimize-log { font-size: 0.85rem; line-height: 1.4; }
        #optimize-log .log-entry { margin-bottom: 4px; padding: 2px 0; border-bottom: 1px dashed #eee; }
        #optimize-log .log-info { color: #333; }
        #optimize-log .log-success { color: var(--success); }
        #optimize-log .log-warning { color: #f59e0b; }
        #optimize-log .log-error { color: var(--danger); }
        #results-table th, #results-table td { padding: 10px; text-align: left; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        #results-table th { background: #f8f9fa; color: #666; font-weight: 600; position: sticky; top: 0; }
        #results-table tbody tr:hover { background: #f8f9fa; }
        @media (max-width: 768px) {
            .param-row { grid-template-columns: 1fr 1fr; gap: 6px; }
            .param-row .remove-param { grid-column: 2; grid-row: 2; }
            #optimize-progress { margin: 0 10px; }
        }
    </style>
</head>
<body>
    <!-- 侧边导航 -->
    <nav class="sidebar">
        <h1>🦀 CTR</h1>
        <a href="#" class="nav-item active" data-page="dashboard" data-icon="📊"> <span>Dashboard</span></a>
        <a href="#" class="nav-item" data-page="trades" data-icon="💱"> <span>交易</span></a>
        <a href="#" class="nav-item" data-page="strategies" data-icon="🧠"> <span>策略</span></a>
        <a href="#" class="nav-item" data-page="backtest" data-icon="📈"> <span>回测</span></a>
        <a href="#" class="nav-item" data-page="settings" data-icon="⚙️"> <span>设置</span></a>
        <a href="#" class="nav-item" data-page="logs" data-icon="📋"> <span>日志</span></a>
    </nav>

    <!-- 主内容 -->
    <main class="main">
        <div class="header">
            <h2 id="page-title">Dashboard</h2>
            <div>
                <span id="mode-badge" class="btn btn-sm">local</span>
                <button id="toggle-trader" class="btn btn-sm">停止</button>
            </div>
        </div>

        <!-- Dashboard 页面 -->
        <div id="dashboard" class="page">
            <div class="status-bar">
                <div class="stat-card">
                    <div class="stat-label">余额 (USDT)</div>
                    <div class="stat-value" id="bal">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">总盈亏</div>
                    <div class="stat-value" id="total-pnl">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">活跃持仓</div>
                    <div class="stat-value" id="open-positions">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">今日交易</div>
                    <div class="stat-value" id="today-trades">0</div>
                </div>
            </div>

            <div class="card">
                <h3>余额走势</h3>
                <div class="chart-container">
                    <canvas id="balanceChart"></canvas>
                </div>
            </div>

            <div class="card">
                <h3>当前持仓</h3>
                <table id="positions-table">
                    <thead><tr><th>交易对</th><th>方向</th><th>数量</th><th>入场价</th><th>当前价</th><th>盈亏</th><th>操作</th></tr></thead>
                    <tbody id="positions-body"></tbody>
                </table>
            </div>

            <div class="card">
                <h3>最近交易</h3>
                <table id="trades-table">
                    <thead><tr><th>时间</th><th>交易对</th><th>方向</th><th>数量</th><th>价格</th><th>盈亏</th></tr></thead>
                    <tbody id="trades-body"></tbody>
                </table>
            </div>
        </div>

        <!-- 交易页面 -->
        <div id="trades" class="page" style="display:none;">
            <div class="card">
                <h3>快速下单</h3>
                <form id="order-form" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
                    <div class="form-group">
                        <label>交易对</label>
                        <select id="order-symbol">
                            <option value="BTC/USDT">BTC/USDT</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>方向</label>
                        <select id="order-side">
                            <option value="buy">买入</option>
                            <option value="sell">卖出</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>数量</label>
                        <input type="number" step="0.001" id="order-quantity" placeholder="0.01" required>
                    </div>
                    <div class="form-group">
                        <label>类型</label>
                        <select id="order-type">
                            <option value="market">市价单</option>
                        </select>
                    </div>
                    <div class="form-group" style="display: flex; align-items: flex-end;">
                        <button type="submit" class="btn" style="width:100%;">提交订单</button>
                    </div>
                </form>
                <div id="order-result" style="margin-top:15px;"></div>
            </div>

            <div class="card">
                <h3>活跃订单</h3>
                <table id="active-orders-table">
                    <thead><tr><th>ID</th><th>交易对</th><th>方向</th><th>数量</th><th>价格</th><th>状态</th><th>操作</th></tr></thead>
                    <tbody id="active-orders-body"></tbody>
                </table>
            </div>
        </div>

        <!-- 策略页面 -->
        <div id="strategies" class="page" style="display:none;">
            <div class="card">
                <h3>策略列表</h3>
                <div id="strategies-list" style="display: grid; gap: 20px;"></div>
                <button class="btn" id="reload-strategies" style="margin-top:15px;">重载所有策略</button>
            </div>
        </div>

        <!-- 回测页面 -->
        <div id="backtest" class="page" style="display:none;">
            <div class="card">
                <!-- 标签页导航 -->
                <div class="tabs" style="display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #eee;">
                    <button class="tab-btn active" data-tab="bt-config" style="padding: 10px 20px; border: none; background: transparent; cursor: pointer; border-bottom: 2px solid var(--primary); font-weight: 500;">回测配置</button>
                    <button class="tab-btn" data-tab="bt-optimize" style="padding: 10px 20px; border: none; background: transparent; cursor: pointer; border-bottom: 2px solid transparent; color: #666;">参数优化</button>
                </div>

                <!-- 回测配置标签页 -->
                <div id="bt-config" class="tab-content">
                    <form id="backtest-form" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px;">
                        <div class="form-group">
                            <label>策略</label>
                            <select id="bt-strategy">
                                <option value="ma_cross">MA 交叉</option>
                                <option value="rsi">RSI</option>
                                <option value="bollinger">布林带</option>
                                <option value="macd">MACD</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>天数</label>
                            <input type="number" id="bt-days" value="30" min="1" max="365">
                        </div>
                        <div class="form-group">
                            <label>初始资金</label>
                            <input type="number" id="bt-initial" value="10000">
                        </div>
                        <div class="form-group" style="display: flex; align-items: flex-end;">
                            <button type="submit" class="btn">开始回测</button>
                        </div>
                    </form>
                    <div id="bt-result" style="margin-top: 20px;"></div>
                    <canvas id="bt-chart" class="chart-container" style="display:none;"></canvas>
                </div>

                <!-- 参数优化标签页 -->
                <div id="bt-optimize" class="tab-content" style="display: none;">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <!-- 左侧：配置区域 -->
                        <div>
                            <div class="card" style="margin-bottom: 20px;">
                                <h3>优化配置</h3>
                                <form id="optimize-form">
                                    <div class="form-group">
                                        <label>策略选择</label>
                                        <select id="opt-strategy" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                                            <option value="ma_cross">MA 交叉</option>
                                            <option value="rsi">RSI</option>
                                            <option value="bollinger">布林带</option>
                                            <option value="macd">MACD</option>
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label>回测天数</label>
                                        <input type="number" id="opt-days" value="30" min="1" max="365" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                                    </div>
                                    <div class="form-group">
                                        <label>初始资金 (USDT)</label>
                                        <input type="number" id="opt-initial" value="10000" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                                    </div>
                                    <div class="form-group">
                                        <label>优化方向</label>
                                        <select id="opt-direction" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                                            <option value="maximize_sharpe">最大化 Sharpe</option>
                                            <option value="maximize_return">最大化收益率</option>
                                            <option value="minimize_drawdown">最小化最大回撤</option>
                                            <option value="custom_score">自定义评分 (Sharpe×收益/回撤)</option>
                                        </select>
                                    </div>
                                </form>
                            </div>

                            <div class="card">
                                <h3>参数范围设置 <button type="button" id="add-param-btn" class="btn btn-sm" style="float: right; margin-top: -8px;">+ 添加参数</button></h3>
                                <div id="params-container" style="margin-top: 15px;">
                                    <!-- 参数行示例 -->
                                    <div class="param-row" style="display: grid; grid-template-columns: 1fr 80px 80px 80px 32px; gap: 8px; margin-bottom: 10px; align-items: center;">
                                        <input type="text" class="param-name" placeholder="参数名 (如: fast_period)" style="padding: 6px; border: 1px solid #ddd; border-radius: 4px;">
                                        <input type="number" class="param-min" placeholder="min" style="padding: 6px; border: 1px solid #ddd; border-radius: 4px;">
                                        <input type="number" class="param-max" placeholder="max" style="padding: 6px; border: 1px solid #ddd; border-radius: 4px;">
                                        <input type="number" class="param-step" placeholder="step" style="padding: 6px; border: 1px solid #ddd; border-radius: 4px;">
                                        <button type="button" class="remove-param btn btn-sm btn-danger" style="padding: 4px 8px;">×</button>
                                    </div>
                                </div>
                            </div>

                            <div style="text-align: center; margin-top: 15px;">
                                <button id="start-optimize-btn" class="btn" style="width: 100%; padding: 12px; font-size: 1rem;">开始参数优化</button>
                            </div>
                        </div>

                        <!-- 右侧：进度和结果 -->
                        <div>
                            <!-- 优化进度 -->
                            <div class="card" style="margin-bottom: 20px;">
                                <h3>优化进度</h3>
                                <div id="optimize-progress" style="display: none;">
                                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                                        <span id="progress-text">0%</span>
                                        <span id="progress-count">0 / 0</span>
                                    </div>
                                    <div style="background: #eee; height: 20px; border-radius: 4px; overflow: hidden;">
                                        <div id="progress-bar" style="background: var(--primary); height: 100%; width: 0%; transition: width 0.3s;"></div>
                                    </div>
                                    <div id="optimize-log" style="margin-top: 15px; background: #f8f9fa; padding: 10px; border-radius: 4px; height: 150px; overflow-y: auto; font-family: monospace; font-size: 0.85rem; color: #666;"></div>
                                </div>
                                <div id="optimize-waiting" style="text-align: center; padding: 30px; color: #999;">
                                    <p>配置参数范围后点击"开始参数优化"</p>
                                </div>
                            </div>

                            <!-- 优化结果 -->
                            <div class="card">
                                <h3>优化结果 
                                    <button id="export-csv-btn" class="btn btn-sm" style="float: right; margin-top: -8px; display: none;">导出 CSV</button>
                                </h3>
                                <div id="results-container" style="margin-top: 15px;">
                                    <p id="no-results" style="color: #999; text-align: center; padding: 30px;">暂无优化结果</p>
                                    <table id="results-table" style="display: none; width: 100%; border-collapse: collapse; margin-top: 10px;">
                                        <thead>
                                            <tr style="background: #f8f9fa;">
                                                <th style="padding: 10px; text-align: left;">参数组合</th>
                                                <th style="padding: 10px;">Sharpe</th>
                                                <th style="padding: 10px;">收益率</th>
                                                <th style="padding: 10px;">最大回撤</th>
                                            </tr>
                                        </thead>
                                        <tbody id="results-body"></tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 设置页面 -->
        <div id="settings" class="page" style="display:none;">
            <div class="card">
                <h3>系统设置</h3>
                <form id="settings-form" style="max-width: 600px;">
                    <div class="form-group">
                        <label>交易所</label>
                        <select id="setting-exchange">
                            <option value="okx">OKX</option>
                            <option value="binance">Binance</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>通知启用</label>
                        <select id="setting-notify">
                            <option value="true">是</option>
                            <option value="false">否</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>自动交易</label>
                        <select id="setting-auto">
                            <option value="true">启用</option>
                            <option value="false">禁用</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>最大同时持仓数</label>
                        <input type="number" id="setting-max-trades" value="3" min="1" max="10">
                    </div>
                    <button type="submit" class="btn">保存并应用</button>
                </form>
                <div id="settings-status" style="margin-top:10px;"></div>
            </div>
        </div>

        <!-- 日志页面 -->
        <div id="logs" class="page" style="display:none;">
            <div class="card">
                <h3>系统日志</h3>
                <div id="log-content" style="background: #1a1a2e; color: #0f0; padding: 15px; border-radius: 6px; height: 500px; overflow-y: auto; font-family: monospace; white-space: pre-wrap;"></div>
            </div>
        </div>
    </main>

    <script src="/static/app_v2.js"></script>
</body>
</html>
